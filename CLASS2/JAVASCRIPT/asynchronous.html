<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asynchronous Javascript</title>
  </head>
  <body>
    <h1>Asynchronous JavaScript</h1>
    <script>
      // synchronous JS
      console.log("start");
      console.log("middle");
      console.log("end");

      // Asynchronous JS
      console.log("Start");
      setTimeout(() => {
        console.log("Inside setTimeout");
      }, 1000); // waits 1 second
      console.log("End");

      // setTimeout()
      setTimeout(() => {
        // alert("Hello World after 3 seconds");
        console.log("Hello Wold after 2 second");
      }, 2000);

      // setInterval()
      let count = 0;
      let interval = setInterval(() => {
        console.log("Count:", count++);
        if (count > 3) clearInterval(interval); //stops after 4
      }, 3000);

      //   callback
      function greetUser(name, callback) {
        console.log(`hi, my name is ${name}`);
        callback();
      }
      greetUser("John", function () {
        console.log("This is a callback");
      });

      // callback hell
      setTimeout(() => {
        console.log("callback hell 1");
        setTimeout(() => {
          console.log("callback hell 2");
          setTimeout(() => {
            console.log("final callback hell");
          }, 1000);
        }, 1000);
      }, 1000);

      // Promises
      let promise = new Promise((resolve, reject) => {
        let mySuccess = false;
        if (mySuccess) {
          resolve("It worked successfully!");
        } else {
          reject("It failed woefully!");
        }
      });
      promise
      .then((response) => console.log(response))
      .catch((error) => console.log(error));
    </script>
  </body>
</html>
