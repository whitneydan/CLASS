<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API's</title>
  </head>
  <body>
    <h1>Application Programming Interface & Fetch API</h1>
    <h2>User's Information</h2>
    <ol id="userOutput"></ol>
    <p> 
      You = your code (JavaScript) <br />
      Waiter = Fetch API <br />
      Kitchen = the backend server <br />
      Food = the data (usually in JSON)
    </p>
    <script>
      fetch("https://jsonplaceholder.typicode.com/users")
        .then((response) => {
          console.log(response); //comes out as a response object and not the actual data.
          return response.json(); // This turns the response data into a usable JS object.
        })
        .then((data) => {
          console.log(data); // console log the entire response
          //   console.log(data[0].name)
          data.forEach((user) => {
            console.log(
              My name is:${user.name}, i live in: ${user.address.city}
            );
          });
        });
      // EXAMPLE
      async function getUsers() {
        try {
          const response = await fetch(
            "https://jsonplaceholder.typicode.com/users"
          );
          const data = await response.json();
          let output = "";
          data.forEach((user) => {
            output += <li>Name:${user.name} <br/> Email address: ${user.email}</li>;
          });
          let usersOutput = document.getElementById("userOutput");
          usersOutput.innerHTML = output;
        } catch (error) {
          console.log("Error:", error);
        }
      }
      getUsers();
    </script>
  </body>
</html>
