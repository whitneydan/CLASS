<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POSITIONING</title>
    <style>
        *{
            
        }
        body{
            background-color: goldenrod;
            height: 150vh;
        }

   .red{
    background-color: red;
    height: 100px;
    width: 100px;
    border: 2px solid black;
    position: fixed;
   }

 .blue{
    background-color: blue;
    height: 100px;
    width: 100px;
    border: 2px solid black;
    position: relative;
    left: 70%;
    top: 20%;
    
 }
 
   .green{
    background-color: green;
    height: 100px;
    width: 100px;
    border: 2px solid black;
    position: absolute;
    left: 35%;
   }
   

    </style>
</head>
<body>
 <div class="parent">
 <div class="red ">BOX-RED</div>
 <div class="blue">BOX-BLUE</div>
 <div class="green">BOX-GREEN</div>
 </div>
    <!--Developer tools or mobile simulators, to view the mobile size or tablet  -->
</body>
</html>
