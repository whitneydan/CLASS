<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
        width: 50px;
        height: 50px;
        }
        .box1{
         background-color: red;
         position: fixed
        }

        .box2{
            background-color: blue ;
            position: relative;
            left: 450px;
        }
        .box3{
            background-color: green;
            position: relative;
            top: 100px;
            left: 250px;
        }
        a{
            text-decoration: none;
        }
       
        #myname{
            text-decoration: line-through;
            font-weight: 900;
            text-decoration: underline;
        }
    </style>
</head>
<body style="height: 150vh;">
    <h1>Cascading child sheet</h1>
    <div>
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
    </div>

    <p><a href="#" target="_blank">click me</a> to visit MR-International</p>

    <p id="myname"">UBA</p>
</body>
</html>
